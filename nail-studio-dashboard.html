<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nail Studio · Project Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/logo-ns.svg">
<script src="/js/supabase.min.js"></script>
<style>
  :root {
    --bg:       #EBF2F9;
    --surface:  #FFFFFF;
    --panel:    #D8E5F2;
    --mid:      #A2B2C3;
    --deep:     #6B89A3;
    --ink:      #1E2D3D;
    --muted:    #7A90A4;
    --border:   #C8D9EA;
    --tab-active: #A2B2C3;
    --shadow:   rgba(30,45,61,0.08);
    --accent:   #5E7F9A;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    position: relative;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    height: 36px;
    width: auto;
    display: block;
  }

  .header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .studio-name {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .studio-sub {
    font-size: 9px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  /* ── TABS BAR ────────────────────────────────── */
  .tabs-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 32px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 7px 16px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12.5px;
    font-weight: 400;
    color: var(--muted);
    border: 1px solid transparent;
    background: none;
    cursor: pointer;
    border-radius: 20px;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab-btn:hover {
    background: var(--panel);
    color: var(--ink);
    border-color: var(--border);
  }

  .tab-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 500;
    border-color: var(--accent);
  }

  .tab-badge {
    background: rgba(255,255,255,0.25);
    color: inherit;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
  }

  .tab-btn:not(.active) .tab-badge {
    background: var(--panel);
    color: var(--deep);
  }

  /* ── MAIN ────────────────────────────────────── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 32px 80px;
  }

  /* ── PANELS ──────────────────────────────────── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── CARD ────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .card-header {
    padding: 20px 28px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--panel);
    background: #FAFDFF;
  }

  .card-title-wrap { display:flex; align-items:center; gap:10px; }

  .card-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .card-title {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 19px;
    font-weight: 500;
    color: var(--ink);
  }

  .card-count {
    font-size: 11px;
    color: var(--deep);
    background: var(--panel);
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 400;
  }

  .card-body { padding: 22px 28px; }

  /* ── BUTTONS ─────────────────────────────────── */
  .btn-edit {
    padding: 7px 18px;
    border-radius: 20px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }
  .btn-edit:hover { background: var(--panel); border-color: var(--mid); color: var(--accent); }

  .btn-save {
    padding: 7px 18px;
    border-radius: 20px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: white;
  }
  .btn-save:hover { background: var(--deep); border-color: var(--deep); }

  /* ── LINK LIST ───────────────────────────────── */
  .link-list { display:flex; flex-direction:column; gap:2px; }

  .link-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-radius: 8px;
    transition: background 0.1s;
    gap: 12px;
  }
  .link-item:hover { background: var(--bg); }

  .link-item-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .link-num {
    font-size: 13px;
    color: var(--border);
    font-weight: 400;
    min-width: 20px;
    text-align: right;
  }

  .link-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--ink);
    min-width: 160px;
  }

  .link-url a {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.12s;
  }
  .link-url a:hover { color: var(--accent); text-decoration: underline; }

  .link-note {
    font-size: 13px;
    color: var(--mid);
    white-space: nowrap;
    background: var(--panel);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* ── EDIT MODE ───────────────────────────────── */
  .edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--panel);
  }

  .edit-input {
    flex: 1;
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border 0.12s;
  }
  .edit-input:focus { border-color: var(--mid); background: white; }

  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    font-size: 16px;
    padding: 4px 6px;
    border-radius: 6px;
    transition: all 0.12s;
    line-height: 1;
  }
  .btn-del:hover { color: #C07070; background: #FFF0F0; }

  .btn-add-row {
    margin-top: 12px;
    padding: 8px 16px;
    border: 1px dashed var(--mid);
    border-radius: 8px;
    background: none;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.12s;
    width: 100%;
    text-align: left;
  }
  .btn-add-row:hover { border-color: var(--accent); color: var(--accent); background: var(--panel); }

  /* ── BOOKING TABLE ───────────────────────────── */
  .booking-table { width:100%; border-collapse:collapse; }

  .booking-table th {
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 12px 12px;
    border-bottom: 1px solid var(--border);
  }

  .booking-table td {
    padding: 11px 12px;
    font-size: 14px;
    font-weight: 400;
    border-bottom: 1px solid var(--panel);
    vertical-align: middle;
  }
  .booking-table tr:last-child td { border-bottom: none; }
  .booking-table tr:hover td { background: var(--bg); }
  .booking-platform { font-weight: 500; color: var(--ink); }
  .booking-link a { color: var(--muted); text-decoration: none; font-size: 14px; }
  .booking-link a:hover { color: var(--accent); }

  /* ── HIGHLIGHTS ──────────────────────────────── */
  .highlights-wrap { display:flex; flex-wrap:wrap; gap:10px; }

  .highlight-tag {
    padding: 8px 18px;
    border-radius: 20px;
    background: var(--panel);
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    border: 1px solid var(--border);
    transition: all 0.12s;
  }
  .highlight-tag:hover { background: var(--mid); color: white; border-color: var(--mid); }

  .highlights-edit { display:flex; flex-wrap:wrap; gap:8px; }

  .highlight-edit-item {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 6px 4px 12px;
  }
  .highlight-edit-item input {
    border: none;
    background: transparent;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    outline: none;
    width: 110px;
  }

  /* ── CONTENT PLAN — ACCORDION ───────────────── */
  .content-list { display:flex; flex-direction:column; gap:8px; }

  .content-item {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
  }
  .content-item.dragging {
    opacity: 0.4;
    transform: scale(0.98);
  }
  .content-item.drag-over {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent), 0 4px 20px rgba(94,127,154,0.18);
    transform: scale(1.01);
  }
  .drag-handle {
    cursor: grab;
    color: var(--border);
    font-size: 16px;
    padding: 0 4px 0 0;
    flex-shrink: 0;
    line-height: 1;
    transition: color 0.12s;
    user-select: none;
  }
  .drag-handle:hover { color: var(--mid); }
  .drag-handle:active { cursor: grabbing; }

  .content-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    gap: 16px;
  }
  .content-trigger:hover { background: var(--bg); }
  .content-item.open .content-trigger { background: var(--panel); border-bottom: 1px solid var(--border); }

  .content-trigger-left { display:flex; align-items:center; gap:14px; flex:1; min-width:0; }

  .content-index {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    min-width: 20px;
  }

  .content-main-title {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
  }

  .content-type-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: 10px;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge-рилс     { background: #FEF3E8; color: #C07830; border-color: #F5D5B0; }
  .badge-карусель { background: #EDF6EE; color: #3A8A4A; border-color: #C0E0C5; }
  .badge-пост     { background: #F5F0FB; color: #7A5AB8; border-color: #DDD0F5; }

  .content-arrow {
    font-size: 13px;
    color: var(--mid);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .content-item.open .content-arrow { transform: rotate(90deg); }

  .content-description {
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.6;
  }

  .content-body {
    display: none;
    padding: 18px 22px 20px;
    border-top: 1px solid var(--panel);
  }
  .content-item.open .content-body { display: block; }

  .slide-list { display:flex; flex-direction:column; gap:0; }

  .slide-item {
    padding: 9px 0;
    border-bottom: 1px solid var(--panel);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .slide-item:last-child { border-bottom: none; }

  .slide-num {
    font-size: 10px;
    color: var(--mid);
    min-width: 22px;
    padding-top: 2px;
    font-weight: 500;
  }
  .slide-text { font-size: 14px; font-weight: 400; color: var(--muted); line-height: 1.65; }
  .slide-label { font-weight: 500; color: var(--ink); font-size: 14px; display:block; margin-bottom:2px; }

  /* Edit posts */
  .post-edit-wrap { display:flex; flex-direction:column; gap:8px; padding-top:4px; }

  .slide-edit-row { display:flex; gap:6px; align-items:flex-start; }
  .slide-edit-num { font-size: 10px; color: var(--mid); min-width: 22px; padding-top: 10px; font-weight:500; }

  .slide-edit-input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    resize: none;
    overflow: hidden;
    min-height: 40px;
    transition: border 0.12s;
    line-height: 1.5;
  }
  .slide-edit-input:focus { border-color: var(--mid); background: white; }

  .desc-edit-input {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    resize: none;
    overflow: hidden;
    min-height: 40px;
    line-height: 1.6;
    transition: border 0.12s;
  }
  .desc-edit-input:focus { border-color: var(--mid); background: white; }

  /* ── POST ICON BUTTONS ───────────────────────── */
  .post-icon-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 7px;
    padding: 5px 6px;
    font-size: 14px;
    cursor: pointer;
    color: var(--mid);
    transition: all 0.12s;
    line-height: 1;
    display: flex;
    align-items: center;
  }
  .post-icon-btn:hover { background: var(--panel); border-color: var(--border); color: var(--ink); }
  .post-icon-btn.delete:hover { background: #FEE8E8; border-color: #F5C0C0; color: #C03030; }

  /* ── RICH TEXT EDITOR ────────────────────────── */
  .rte-wrap { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: white; }
  .rte-toolbar {
    display: flex;
    gap: 2px;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .rte-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 4px 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.12s;
    font-family: Georgia, serif;
    line-height: 1;
  }
  .rte-btn:hover { background: var(--panel); color: var(--ink); border-color: var(--border); }
  .rte-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .rte-sep { width: 1px; background: var(--border); margin: 2px 4px; }
  .rte-content {
    padding: 12px 14px;
    min-height: 120px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--ink);
    line-height: 1.75;
    outline: none;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .rte-content:empty::before { content: attr(data-placeholder); color: var(--mid); }

  .post-save-btn {
    padding: 5px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
  }
  .post-save-btn:hover { background: var(--deep); }
  .post-cancel-btn {
    padding: 5px 10px;
    background: none;
    color: var(--mid);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .post-cancel-btn:hover { background: var(--panel); color: var(--ink); }

  /* ── POST DESCRIPTION VIEW ───────────────────── */
  .post-desc-view {
    font-size: 13.5px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.75;
    white-space: pre-line;
    word-break: break-word;
  }
  .post-desc-view a { color: var(--accent); text-decoration: underline; word-break: break-all; }

  /* ── DELETE MODAL ────────────────────────────── */
  .del-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    z-index: 500; display: flex; align-items: center; justify-content: center;
  }
  .del-modal {
    background: white; border-radius: 14px; padding: 28px 32px;
    max-width: 380px; width: 90%; box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    text-align: center;
  }
  .del-modal h3 { font-size: 16px; font-weight: 600; color: var(--ink); margin: 0 0 10px; }
  .del-modal p  { font-size: 13px; color: var(--mid); margin: 0 0 22px; line-height: 1.5; }
  .del-modal-actions { display: flex; gap: 10px; justify-content: center; }
  .del-modal-actions button { padding: 9px 22px; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.12s; }
  .del-confirm { background: #C83030; color: white; }
  .del-confirm:hover { background: #A02020; }
  .del-cancel-m { background: var(--panel); color: var(--ink); }
  .del-cancel-m:hover { background: var(--border); }


  /* ── STATUS BADGE ────────────────────────────── */
  .status-check {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .status-check input[type=checkbox] { display: none; }
  .status-pill {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid;
    transition: all 0.15s;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .status-pill.done { background: #E6F4EA; color: #2D7A47; border-color: #A8D5B5; }
  .status-pill.todo { background: var(--panel); color: var(--muted); border-color: var(--border); }

  /* ── TYPE BADGE COLORS ───────────────────────── */
  .type-reel   { background: #EAF0FB; color: #3A63C4; border-color: #B8CEF0; }
  .type-video  { background: #F0EAF8; color: #6A3A9E; border-color: #CEB8E8; }
  .type-carousel { background: #EAF6F0; color: #2D7A5E; border-color: #A8D5C4; }
  .type-default { background: var(--panel); color: var(--muted); border-color: var(--border); }

  /* ── EXPORT/IMPORT ──────────────────────────────── */
  .header-actions { display:flex; align-items:center; gap:8px; }

  .btn-hdr {
    padding: 5px 14px;
    border-radius: 16px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }
  .btn-hdr:hover { background: var(--panel); border-color: var(--mid); color: var(--accent); }
  .btn-hdr.import { border-color: var(--accent); color: var(--accent); }
  .btn-hdr.import:hover { background: var(--accent); color: white; }

  .toast {
    position: fixed;
    bottom: 80px;
    right: 36px;
    z-index: 300;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 400;
    background: var(--ink);
    color: white;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 768px) {
    /* ── HEADER ── */
    header {
      padding: 0 16px;
      height: 52px;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
    }
    .header-logo { height: 28px; }
    .header-center { align-items: flex-start; }
    .studio-name { font-size: 12px; letter-spacing: 0.02em; }
    .studio-sub { display: none; }

// Нормализует HTML из contenteditable → чистый HTML с <br> вместо <div>/<p>
function normalizeRTE(el) {
  const clone = el.cloneNode(true);
  // Каждый <div>/<p> → его содержимое + <br> перед ним
  clone.querySelectorAll('div, p').forEach(block => {
    block.before(document.createElement('br'));
    while (block.firstChild) block.before(block.firstChild);
    block.remove();
  });
  let html = clone.innerHTML;
  // Убираем лишние <br> в начале/конце
  html = html.replace(/^(\s*<br\s*\/?>)+/gi, '').replace(/(\s*<br\s*\/?>)+\s*$/gi, '');
  // Не более двух <br> подряд
  html = html.replace(/(<br\s*\/?>(\s*)){3,}/gi, '<br><br>');
  return html.trim();
}

// Возвращает контент поста для вставки в RTE (и для view mode)
function postContentForRTE(post) {
  let c = post.description || '';
  const slides = post.slides && post.slides.filter(s => s.text);
  const hasSlides = slides && slides.length > 0;

  // Авто-миграция: если описание не содержит <br> (битый старый формат),
  // но есть слайды — берём контент из слайдов
  if (c && !/<br/i.test(c) && hasSlides) {
    c = ''; // сбрасываем, будем брать из слайдов
  }

  // Нет описания → строим из слайдов
  if (!c && hasSlides) {
    return slides.map((s, i) => esc(`${i+1}. ${s.text}`)).join('<br><br>');
  }

  if (!c) return '';

  // Plain text (нет тегов) → конвертируем \n в <br>
  if (!/<[a-z]/i.test(c)) {
    return c.split('\n').map(line => esc(line)).join('<br>');
  }

  // HTML с <div>/<p> (старый формат contenteditable) → нормализуем
  if (/<div|<p/i.test(c)) {
    const tmp = document.createElement('div');
    tmp.innerHTML = c;
    return normalizeRTE(tmp);
  }

  // Уже чистый HTML с <br> — возвращаем как есть
  return c;
}

// Для view mode: всегда рендерим как HTML, <br> даёт переносы
function linkifyHTML(html) {
  // linkify plain-text URLs that are NOT already inside an href/src attribute
  return html.replace(/(^|[\s>])(https?:\/\/[^\s<"'&]+)/g,
    '$1<a href="$2" target="_blank" style="color:var(--accent);text-decoration:underline;word-break:break-all">$2</a>');
}

function renderPostContent(post) {
  const c = postContentForRTE(post);
  if (!c) return '<div style="color:var(--mid);font-size:13px">Нет описания</div>';
  return `<div class="post-desc-view">${linkifyHTML(c)}</div>`;
}

  setTimeout(() => {
    const el = document.getElementById('post-item-' + pi);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onDragOver(e, pi) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.content-item').forEach(el => el.classList.remove('drag-over'));
  const el = document.getElementById('post-item-' + pi);
  if (el && dragSrc !== pi) el.classList.add('drag-over');
}

function onDragLeave(pi) {
  const el = document.getElementById('post-item-' + pi);
  if (el) el.classList.remove('drag-over');
}

function onDrop(e, pi) {
  e.preventDefault();
  document.querySelectorAll('.content-item').forEach(el => {
    el.classList.remove('drag-over');
    el.classList.remove('dragging');
  });
  if (dragSrc === null || dragSrc === pi) return;
  const moved = state.posts.splice(dragSrc, 1)[0];
  state.posts.splice(pi, 0, moved);
  save('posts');
  dragSrc = null;
  renderPosts();
}

function onDragEnd() {
  document.querySelectorAll('.content-item').forEach(el => {
    el.classList.remove('dragging');
    el.classList.remove('drag-over');
  });
  dragSrc = null;
}

function renderPrices() {
  const body = document.getElementById('body-prices');
  if (!body) return;
  if (state.editing.prices) {
    body.innerHTML = state.prices.map((sec, si) => `
      <div class="price-section" style="border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
          <input class="edit-input" style="font-weight:600;font-size:13px;letter-spacing:0.05em;flex:1" value="${esc(sec.section)}" placeholder="Название раздела" oninput="state.prices[${si}].section=this.value">
          <button class="btn-del" onclick="delPriceSection(${si})" title="Удалить раздел">×</button>
        </div>
        ${sec.items.map((item, ii) => `
          <div class="edit-row">
            <input class="edit-input" style="flex:2" value="${esc(item.name)}" placeholder="Название" oninput="state.prices[${si}].items[${ii}].name=this.value">
            <input class="edit-input" style="flex:1" value="${esc(item.note||'')}" placeholder="Примечание" oninput="state.prices[${si}].items[${ii}].note=this.value">
            <input class="edit-input" style="flex:0.6;max-width:100px" value="${esc(item.price||'')}" placeholder="Цена" oninput="state.prices[${si}].items[${ii}].price=this.value">
            <button class="btn-del" onclick="delPriceItem(${si},${ii})">×</button>
          </div>`).join('')}
        <button class="btn-add-row" style="margin-top:8px" onclick="addPriceItem(${si})">+ Добавить позицию</button>
      </div>`).join('') +
      `<button class="btn-add-row" style="margin-top:4px" onclick="addPriceSection()">+ Добавить раздел</button>`;
  } else {
    body.innerHTML = state.prices.map(sec => `
      <div class="price-section">
        <div class="price-section-title">${esc(sec.section)}</div>
        ${sec.items.map(item => `
          <div class="price-row">
            <span class="price-name">${esc(item.name)}${item.note ? `<span class="price-note">— ${esc(item.note)}</span>` : ''}</span>
            ${item.price ? `<span class="price-val">${esc(item.price)}</span>` : `<span class="price-tbd">—</span>`}
          </div>`).join('')}
      </div>`).join('');
  }
}

function delPriceSection(si) { state.prices.splice(si,1); renderPrices(); }
function delPriceItem(si, ii) { state.prices[si].items.splice(ii,1); renderPrices(); }
function addPriceItem(si) { state.prices[si].items.push({ name:'', note:'', price:'' }); renderPrices(); }
function addPriceSection() { state.prices.push({ section:'Новый раздел', items:[] }); renderPrices(); }

// ── EXPORT / IMPORT ───────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportData() {
  const data = {
    _version: 1,
    _exported: new Date().toISOString(),
    instagram: state.instagram,
    sites: state.sites,
    booking: state.booking,
    highlights: state.highlights,
    posts: state.posts,
    prices: state.prices,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `nail-studio-dashboard-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Данные экспортированы');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.instagram) { state.instagram = data.instagram; save('instagram'); }
      if (data.sites)     { state.sites     = data.sites;     save('sites'); }
      if (data.booking)   { state.booking   = data.booking;   save('booking'); }
      if (data.highlights){ state.highlights= data.highlights;save('highlights'); }
      if (data.posts)     { state.posts     = data.posts;     save('posts'); }
      if (data.prices)    { state.prices    = data.prices;    save('prices'); }
      renderInstagram(); renderSites(); renderBooking(); renderHighlights(); renderPosts(); renderPrices();
      showToast('✓ Данные импортированы — ' + (data.posts?.length||0) + ' постов');
    } catch(err) {
      showToast('⚠ Ошибка чтения файла');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// Авто-сохранение при закрытии вкладки

// ── INIT ──────────────────────────────────────────────────────
function renderAll() {
  renderInstagram(); renderSites(); renderBooking(); renderHighlights(); renderPosts(); renderPrices();
}

const state = {
  instagram:   JSON.parse(JSON.stringify(DEFAULTS.instagram)),
  sites:       JSON.parse(JSON.stringify(DEFAULTS.sites)),
  booking:     JSON.parse(JSON.stringify(DEFAULTS.booking)),
  highlights:  JSON.parse(JSON.stringify(DEFAULTS.highlights)),
  posts:       JSON.parse(JSON.stringify(DEFAULTS.posts)),
  prices:      JSON.parse(JSON.stringify(PRICES)),
  editing:     {},
  openPosts:   {},
  editingPost: null,
};

renderAll();
loadFromDB(); // загружаем из Supabase, перерисовываем

</script>
